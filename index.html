<script>
    fetch('https://raw.githubusercontent.com/EvgenMironov900/test-counter/main/counter.txt')
        .then(response => response.text())
        .then(data => {
            document.getElementById('viewCount').textContent = data.trim();
        })
        .catch(error => {
            console.warn('Счётчик не загружен:', error);
        });
</script>
